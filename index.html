<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<style>
:root{--bg:#f4f3ef;--bg2:#fff;--border:#e4e2da;--text:#1a1a18;--muted:#888780;--green:#3B6D11;--green2:#639922;--teal:#1D9E75;--gold:#BA7517;--gold2:#EF9F27;--red:#D85A30;--red2:#A32D2D;--blue:#185FA5;--blue2:#378ADD;--harbor:#1a3a1a;--pungwoon:#3a1a2a;--radius:12px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;color:var(--text);min-height:100vh;}
.nav{display:flex;align-items:center;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.25);flex-wrap:wrap;}
.nav-logo{font-size:15px;font-weight:700;padding:13px 18px;white-space:nowrap;border-right:1px solid rgba(255,255,255,.15);}
.nav-tab{font-size:12px;font-weight:600;padding:13px 14px;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s;white-space:nowrap;opacity:.6;}
.nav-tab:hover{opacity:1;}
.nav-tab.active{opacity:1;border-bottom-color:currentColor;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:8px;padding-right:16px;}
.sync-btn{font-size:11px;font-weight:600;padding:5px 12px;border-radius:20px;cursor:pointer;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;}
.sync-btn:hover{background:rgba(255,255,255,.2);}
.last-upd{font-size:10px;opacity:.7;color:#fff;white-space:nowrap;}
.nav.harbor{background:var(--harbor);}
.nav.harbor .nav-logo,.nav.harbor .nav-tab{color:#9FE1CB;}
.nav.pungwoon{background:var(--pungwoon);}
.nav.pungwoon .nav-logo,.nav.pungwoon .nav-tab{color:#f8bbd9;}
.nav.rival{background:#2a1a0a;}
.nav.rival .nav-logo,.nav.rival .nav-tab{color:#ffcc80;}
.page{display:none;padding:20px 18px;max-width:1100px;margin:0 auto;}
.page.active{display:block;}
.stat-row{display:grid;gap:8px;margin-bottom:16px;}
.s4{grid-template-columns:repeat(4,1fr);}
.s5{grid-template-columns:repeat(5,1fr);}
.s6{grid-template-columns:repeat(6,1fr);}
.s-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 13px;text-align:center;}
.s-label{font-size:10px;color:var(--muted);margin-bottom:4px;}
.s-val{font-size:20px;font-weight:700;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px;}
.three-col{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:16px;}
.mb16{margin-bottom:16px;}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.panel-title{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:5px;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0;}
hr.div{border:none;border-top:1px solid var(--border);margin:12px 0;}
.rank-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;font-size:12px;}
.rk-num{color:var(--muted);font-size:10px;min-width:14px;text-align:right;}
.rk-name{font-weight:700;min-width:50px;}
.rk-detail{font-size:10px;color:var(--muted);min-width:72px;}
.rk-bar-wrap{flex:1;height:8px;background:var(--bg);border-radius:4px;overflow:hidden;}
.rk-bar{height:100%;border-radius:4px;}
.rk-val{min-width:24px;text-align:right;font-size:11px;font-weight:700;}
.chem-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border);font-size:11px;}
.chem-row:last-child{border-bottom:none;}
.chem-s{font-weight:700;min-width:48px;}
.chem-a{color:var(--muted);}
.chem-p{color:var(--gold);font-weight:700;}
.top5-head{font-size:10px;font-weight:700;color:var(--muted);background:var(--bg);padding:3px 7px;border-radius:5px;margin-bottom:3px;margin-top:7px;}
.top5-row{display:flex;justify-content:space-between;padding:2px 5px;font-size:11px;}
.stand-row{display:grid;grid-template-columns:24px 1fr 30px 30px 30px 30px 38px 38px;gap:4px;align-items:center;padding:7px 10px;border-bottom:1px solid var(--border);font-size:12px;}
.stand-row:last-child{border-bottom:none;}
.stand-row.hdr{font-size:10px;font-weight:700;color:var(--muted);background:var(--bg);border-radius:6px;margin-bottom:4px;border:none;}
.rb{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;background:var(--bg);color:var(--muted);}
.rb.g{background:#FFF8E1;color:#F57F17;}
.rb.s{background:#F5F5F5;color:#616161;}

.match-cards{display:flex;gap:8px;flex-wrap:wrap;}
.mc-sm{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:9px 11px;text-align:center;min-width:74px;}
.form-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;}
.form-group{display:flex;flex-direction:column;gap:3px;}
.form-group label{font-size:10px;font-weight:700;color:var(--muted);}

.btn:hover{opacity:.85;}

.btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:20px;}
.modal-overlay.open{display:flex;}
.modal{background:#fff;border-radius:var(--radius);padding:22px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{background:none;border:none;font-size:20px;cursor:pointer;color:var(--muted);}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);}
.loading-state{text-align:center;padding:60px 20px;color:var(--muted);}
.spin{font-size:32px;display:inline-block;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.err-box{background:#FCEBEB;border:1px solid #f7c1c1;border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:12px;color:var(--red2);}
.rival-hdr{background:linear-gradient(135deg,#2a1a0a,#1a0a00);border-radius:var(--radius);padding:24px;margin-bottom:20px;text-align:center;}
.rival-hdr h1{color:#ff9800;font-size:22px;font-weight:700;margin-bottom:4px;}
.rival-hdr p{color:#ffcc80;font-size:13px;}
.rival-grid{display:grid;grid-template-columns:1fr 60px 1fr;gap:0;margin-bottom:20px;align-items:center;}
.rival-player{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;}

.rival-player.p2{border-color:#B71C1C;background:linear-gradient(135deg,#FFEBEE,#fff);}

.cmp-bar{height:14px;background:var(--bg);border-radius:7px;overflow:hidden;display:flex;margin:4px 0;}
.cmp-p1{background:#1565C0;}
.cmp-p2{background:#B71C1C;}
.meal-box{background:linear-gradient(135deg,#2a1a0a,#3a2a1a);border-radius:var(--radius);padding:20px;text-align:center;margin-bottom:20px;}
.meal-box h3{color:#ff9800;font-size:16px;margin-bottom:8px;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:10px 20px;border-radius:20px;font-size:12px;font-weight:700;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,.2);}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:12px;}
thead th{background:var(--bg);font-size:10px;font-weight:700;color:var(--muted);padding:7px 8px;text-align:center;border-bottom:1px solid var(--border);white-space:nowrap;}
thead th:first-child{text-align:left;}
tbody td{padding:6px 8px;text-align:center;border-bottom:1px solid var(--border);}
tbody td:first-child{text-align:left;font-weight:700;}
tbody tr:last-child td{border-bottom:none;}
tbody tr:hover{background:var(--bg);}
@media(max-width:600px){.stat-row.s4,.stat-row.s5,.stat-row.s6{grid-template-columns:repeat(3,1fr);}.two-col,.three-col{grid-template-columns:1fr;}.rival-grid{grid-template-columns:1fr 40px 1fr;}}
</style>
</head>

<script>
const SHEET_ID='1cM4UhB-nL6smf4OIn_lqQ0on1AtYG2ff_haIXBvXnK0';
const GID_HDASH='1445436566';
let CH={},HD=null,RT=null;

// ============== NAV ==============
function showTeam(t,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+t).classList.add('active');
  el.classList.add('active');
  document.getElementById('main-nav').className='nav '+t;
  if(t==='harbor'&&!HD)refreshData();
  if(t==='pungwoon')renderPW();
  if(t==='rival')renderRival();
}

// ============== FETCH ==============
async function fetchTab(gid){
  const ctrl=new AbortController();
  const t=setTimeout(()=>ctrl.abort(),10000);
  const url=`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}&t=${Date.now()}`;
  const res=await fetch(url,{signal:ctrl.signal,mode:'cors'});
  clearTimeout(t);
  if(!res.ok)throw new Error('HTTP '+res.status);
  const txt=await res.text();
  if(!txt||txt.trim().length<10)throw new Error('빈데이터');
  return parseCSV(txt);
}

function parseCSV(txt){
  const rows=[];let cur='',inQ=false,row=[];
  for(let i=0;i<txt.length;i++){
    const c=txt[i];
    if(c==='"'){inQ=!inQ;}
    else if(c===','&&!inQ){row.push(cur.trim());cur='';}
    else if((c==='\n'||c==='\r')&&!inQ){
      if(cur!==''||row.length){row.push(cur.trim());rows.push(row);}
      cur='';row=[];
      if(c==='\r'&&txt[i+1]==='\n')i++;
    }else cur+=c;
  }
  if(cur!==''||row.length){row.push(cur.trim());rows.push(row);}
  return rows;
}

async function refreshData(){
  const btn=document.getElementById('sync-btn');
  btn.textContent='⏳';btn.disabled=true;
  try{
    const hRows=await fetchTab(GID_HDASH);
    HD=parseHarbor(hRows);
    const n=new Date();
    document.getElementById('last-upd').textContent=`${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')} ✅`;
    renderHarbor();
    if(RT)clearInterval(RT);
    RT=setInterval(refreshData,5*60*1000);
  }catch(e){
    document.getElementById('last-upd').textContent='⚠️ 실패';
    if(!HD){HD=hbFallback();renderHarbor();}
    console.warn(e);
  }finally{btn.textContent='🔄';btn.disabled=false;}
}

// ============== MASTER PARSE ==============
function parseMaster(rows){
  const d={teams:{},players:{},matches:[],recent:[]};
  const mr=rows.filter(r=>r[9]==='마스터FC'&&r[0]&&r[1]);
  const gmap={};
  for(const r of mr){
    const date=r[0],gid=r[1],myT=r[2],oppT=r[3],scorer=r[4],assist=r[5],og=r[6];
    if(!myT||!oppT)continue;
    const key=`${date}__${gid}__${[myT,oppT].sort().join('__')}`;
    if(!gmap[key])gmap[key]={date,gid,teams:[myT,oppT].sort(),goals:{[myT]:0,[oppT]:0}};
    if(scorer&&!og)gmap[key].goals[myT]=(gmap[key].goals[myT]||0)+1;
    if(og)gmap[key].goals[oppT]=(gmap[key].goals[oppT]||0)+1;
  }
  for(const g of Object.values(gmap)){
    const[t1,t2]=g.teams;const g1=g.goals[t1]||0,g2=g.goals[t2]||0;
    for(const team of[t1,t2]){
      if(!d.teams[team])d.teams[team]={name:team,g:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};
      const myG=(team===t1)?g1:g2,oppG=(team===t1)?g2:g1;
      d.teams[team].g++;d.teams[team].gf+=myG;d.teams[team].ga+=oppG;
      if(myG>oppG){d.teams[team].w++;d.teams[team].pts+=3;}
      else if(myG===oppG){d.teams[team].d++;d.teams[team].pts++;}
      else d.teams[team].l++;
    }
    d.matches.push({...g,score:{[t1]:g1,[t2]:g2}});
  }
  for(const r of mr){
    const sc=r[4],as=r[5],og=r[6];
    if(sc&&!og){if(!d.players[sc])d.players[sc]={name:sc,g:0,a:0,og:0,pts:0};d.players[sc].g++;d.players[sc].pts++;}
    if(as){if(!d.players[as])d.players[as]={name:as,g:0,a:0,og:0,pts:0};d.players[as].a++;d.players[as].pts++;}
    if(og){if(!d.players[og])d.players[og]={name:og,g:0,a:0,og:0,pts:0};d.players[og].og++;}
  }
  d.recent=d.matches.sort((a,b)=>b.date.localeCompare(a.date)||b.gid.localeCompare(a.gid)).slice(0,10);
  return d;
}

function parseHarbor(rows){
  const d={date:'',round:'',players:[],vs:[],topScorers:{},chem:[],half:[]};
  if(rows[0]){
    for(let c=8;c<14;c++){if(rows[0][c]&&rows[0][c].match(/\d{4}-\d{2}-\d{2}/)){d.date=rows[0][c];break;}}
    for(let c=10;c<16;c++){if(rows[0][c]&&rows[0][c].includes('라운드')){d.round=rows[0][c];break;}}
  }
  let hRow=-1;
  for(let i=0;i<rows.length;i++){if(rows[i][2]==='이름'){hRow=i;break;}}
  if(hRow>=0)for(let i=hRow+1;i<rows.length;i++){
    const r=rows[i],name=r[2];if(!name)break;
    d.players.push({num:r[1]||'',name,games:+r[3]||0,field:+r[4]||0,keeper:+r[5]||0,goals:+r[6]||0,assists:+r[7]||0,clean:+r[8]||0,points:+r[9]||0,conceded:+r[10]||0,cr:r[11]||'0.00'});
  }
  const OPPS=new Set(['아이콘','터틀파크','한울']);
  for(let i=0;i<rows.length;i++){const r=rows[i];if(r[15]&&OPPS.has(r[15])&&r[16]&&!isNaN(+r[16])&&+r[16]>0)d.vs.push({opp:r[15],games:+r[16],w:+r[17]||0,d:+r[18]||0,l:+r[19]||0,gf:+r[20]||0,ga:+r[21]||0});}
  let ts=false,co=null;
  for(let i=0;i<rows.length;i++){
    const r=rows[i];
    if(r[15]&&r[15].includes('다득점')){ts=true;continue;}if(!ts)continue;
    if(r[15]&&OPPS.has(r[15])){co=r[15];if(!d.topScorers[co])d.topScorers[co]=[];if(r[16]&&r[17]&&!isNaN(+r[17])&&+r[17]>0)d.topScorers[co].push({name:r[16],goals:+r[17]});}
    else if(co&&(!r[15]||r[15]==='')&&r[16]&&r[17]&&!isNaN(+r[17])&&+r[17]>0){if(!d.topScorers[co])d.topScorers[co]=[];d.topScorers[co].push({name:r[16],goals:+r[17]});}
    else if(r[15]&&!OPPS.has(r[15])&&r[15]!=='상대팀'&&r[15]!=='선수'&&(r[15].includes('케미')||r[15].includes('포인트')||r[15].includes('전반')))break;
  }
  // 파싱 실패 시 하드코딩 fallback
  if(Object.keys(d.topScorers).length===0){
    d.topScorers={'한울':[{name:'주건호',goals:8},{name:'강지선',goals:3},{name:'김준식',goals:3},{name:'김형욱',goals:3},{name:'박동휘',goals:3}],'터틀파크':[{name:'박동휘',goals:8},{name:'주건호',goals:5},{name:'이기세',goals:3},{name:'정경훈',goals:3},{name:'강지선',goals:2}],'아이콘':[{name:'김준식',goals:4},{name:'주건호',goals:3},{name:'김형욱',goals:2},{name:'박동휘',goals:2},{name:'조재상',goals:2}]};
  }
  for(let i=0;i<rows.length;i++){const r=rows[i];if(r[19]&&r[22]&&r[22].includes('%')&&r[19]!=='득점자')d.chem.push({s:r[19],a:r[20]||'단독',p:r[22]});}
  let hh=false;
  for(let i=0;i<rows.length;i++){const r=rows[i];if(r[15]==='선수명'&&r[16]==='전반'){hh=true;continue;}if(hh&&r[15]&&r[19]&&r[19].includes('%'))d.half.push({name:r[15],f:+r[16]||0,s:+r[17]||0,t:+r[18]||0,fp:parseFloat(r[19])||0,sp:parseFloat(r[20])||0});}
  // 경기 결과는 하드코딩 (구글 시트 하버FC 오늘의경기 탭 미연동)
  d.rounds=HB_ROUNDS;
  return d;
}

// ============== PUNGWOON ==============
const PW={get p(){return JSON.parse(localStorage.getItem('pw_p')||'[]');},get m(){return JSON.parse(localStorage.getItem('pw_m')||'[]');},s(k,v){localStorage.setItem('pw_'+k,JSON.stringify(v));}};
function renderPW(){
  const pl=PW.p,matches=PW.m;
  const tW=matches.filter(m=>m.gf>m.ga).length,tD=matches.filter(m=>m.gf===m.ga).length,tL=matches.filter(m=>m.gf<m.ga).length;
  const tGF=matches.reduce((s,m)=>s+m.gf,0),tGA=matches.reduce((s,m)=>s+m.ga,0);
  const reg=matches.filter(m=>m.type==='정기전').length,ev=matches.filter(m=>m.type==='이벤트').length;
  const ps={};
  for(const m of matches)for(const g of(m.goals||[])){
    if(g.sc){if(!ps[g.sc])ps[g.sc]={name:g.sc,goals:0,assists:0,pts:0};ps[g.sc].goals++;ps[g.sc].pts++;}
    if(g.as){if(!ps[g.as])ps[g.as]={name:g.as,goals:0,assists:0,pts:0};ps[g.as].assists++;ps[g.as].pts++;}
  }
  const pArr=Object.values(ps).sort((a,b)=>b.pts-a.pts);
  document.getElementById('pungwoon-content').innerHTML=`
    ${matches.length===0&&pl.length===0?`<div class="panel mb16" style="text-align:center;padding:32px">
      <div style="font-size:36px;margin-bottom:10px">🌟</div><div style="font-size:16px;font-weight:700;margin-bottom:8px">풍운FC 데이터가 없어요!</div>
      <div style="font-size:12px;color:var(--muted)">상단 + 선수 / + 경기 버튼으로 입력하세요</div></div>`:`
    <div class="stat-row s5">
      <div class="s-card"><div class="s-label">총 경기</div><div class="s-val">${matches.length}</div></div>
      <div class="s-card"><div class="s-label">득점</div><div class="s-val" style="color:var(--green)">${tGF}</div></div>
      <div class="s-card"><div class="s-label">실점</div><div class="s-val" style="color:var(--red)">${tGA}</div></div>
      <div class="s-card"><div class="s-label">득실차</div><div class="s-val" style="color:var(--gold)">${tGF>=tGA?'+':''}${tGF-tGA}</div></div>
      <div class="s-card"><div class="s-label">승·무·패</div><div class="s-val" style="color:var(--teal);font-size:13px;margin-top:4px">${tW}·${tD}·${tL}</div></div>
    </div>
    <div class="two-col">
      <div class="panel"><div class="panel-title"><span class="dot" style="background:var(--pungwoon)"></span>경기 유형</div>
        <div style="display:flex;gap:10px">
          <div class="s-card" style="flex:1"><div class="s-label">일요일 정기전</div><div class="s-val" style="color:#9c27b0">${reg}경기</div></div>
          <div class="s-card" style="flex:1"><div class="s-label">이벤트 매치</div><div class="s-val" style="color:var(--gold)">${ev}경기</div></div>
        </div>
      </div>
      <div class="panel"><div class="panel-title"><span class="dot" style="background:var(--green2)"></span>득점 순위</div>
        ${pArr.slice(0,5).map((p,i)=>`<div class="rank-row"><span class="rk-num">${i+1}</span><span class="rk-name">${p.name}</span>
          <span class="rk-detail">${p.goals}골 ${p.assists}어시</span>
          <div class="rk-bar-wrap"><div class="rk-bar" style="width:${Math.round(p.goals/(pArr[0]?.goals||1)*100)}%;background:#9c27b0"></div></div>
          <span class="rk-val" style="color:#9c27b0">${p.pts}</span></div>`).join('')||'<div style="color:var(--muted);font-size:12px">득점 기록 없음</div>'}
      </div>
    </div>`}
    <div class="panel mb16"><div class="panel-title"><span class="dot" style="background:#185FA5"></span>경기 기록</div>
      ${matches.length===0?`<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">경기 기록이 없습니다</div>`:`
      <div class="table-wrap"><table><thead><tr><th>날짜</th><th>유형</th><th>상대팀</th><th>득점</th><th>실점</th><th>결과</th><th></th></tr></thead>
      <tbody>${matches.sort((a,b)=>b.date.localeCompare(a.date)).map(m=>{
        const res=m.gf>m.ga?'승':m.gf<m.ga?'패':'무';
        const rc=m.gf>m.ga?'var(--green)':m.gf<m.ga?'var(--red2)':'var(--muted)';
        return`<tr><td>${m.date}</td><td><span style="font-size:10px;background:var(--bg);padding:2px 6px;border-radius:4px;color:var(--muted)">${m.type}</span></td>

          <td style="color:${rc};font-weight:700">${res}</td>
          <td><button class="btn btn-danger btn-sm" onclick="delPwMatch('${m.id}')">삭제</button></td></tr>`;}).join('')}</tbody></table></div>`}
    </div>
    ${pl.length?`<div class="panel"><div class="panel-title"><span class="dot" style="background:var(--pungwoon)"></span>등록 선수 (${pl.length}명)</div>
      <div style="display:flex;flex-wrap:wrap;gap:8px">${pl.map(p=>`<div style="background:var(--bg);border-radius:8px;padding:7px 11px;font-size:12px;display:flex;align-items:center;gap:7px">

        <button style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px" onclick="delPwPlayer('${p.id}')">✕</button>
      </div>`).join('')}</div></div>`:''}
  `;
}
function openModal(id){
  if(id==='modal-pw-match'){document.getElementById('pw-mid').value='';document.getElementById('pw-mdate').value=new Date().toISOString().slice(0,10);document.getElementById('pw-glist').innerHTML='';document.getElementById('pw-mgf').value=0;document.getElementById('pw-mga').value=0;document.getElementById('pw-mopp').value='';}
  document.getElementById(id).classList.add('open');
}
function closeModal(id){document.getElementById(id).classList.remove('open');}
function savePwPlayer(){
  const name=document.getElementById('pw-pname').value.trim();
  if(!name){alert('이름 입력');return;}
  const id=document.getElementById('pw-pid').value||Date.now().toString();
  const pl=PW.p.filter(p=>p.id!==id);
  pl.push({id,name,num:document.getElementById('pw-pnum').value,pos:document.getElementById('pw-ppos').value});
  PW.s('p',pl);closeModal('modal-pw-player');renderPW();showToast('선수 추가!','var(--pungwoon)','#f8bbd9');
}
function delPwPlayer(id){if(!confirm('삭제?'))return;PW.s('p',PW.p.filter(p=>p.id!==id));renderPW();}
function addGoalRow(){
  const pl=PW.p;const opts='<option value="">선택</option>'+pl.map(p=>`<option>${p.name}</option>`).join('');
  const d=document.createElement('div');d.style.cssText='display:flex;gap:8px;align-items:center;margin-bottom:8px';
  d.innerHTML=`<select style="flex:1;padding:6px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg)">${opts}</select>
    <span style="font-size:11px;color:var(--muted)">→</span>
    <select style="flex:1;padding:6px;border:1px solid var(--border);border-radius:6px;font-size:12px;background:var(--bg)"><option value="">어시없음</option>${pl.map(p=>`<option>${p.name}</option>`).join('')}</select>
    <button onclick="this.parentNode.remove()" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:16px">✕</button>`;
  document.getElementById('pw-glist').appendChild(d);
}
function savePwMatch(){
  const date=document.getElementById('pw-mdate').value;if(!date){alert('날짜 입력');return;}
  const goals=[];document.querySelectorAll('#pw-glist > div').forEach(row=>{const s=row.querySelectorAll('select');if(s[0].value)goals.push({sc:s[0].value,as:s[1].value||null});});
  const id=document.getElementById('pw-mid').value||Date.now().toString();
  const m=PW.m.filter(x=>x.id!==id);
  m.push({id,date,type:document.getElementById('pw-mtype').value,opp:document.getElementById('pw-mopp').value,gf:+document.getElementById('pw-mgf').value,ga:+document.getElementById('pw-mga').value,goals});
  PW.s('m',m);closeModal('modal-pw-match');renderPW();showToast('경기 저장!','var(--pungwoon)','#f8bbd9');
}
function delPwMatch(id){if(!confirm('삭제?'))return;PW.s('m',PW.m.filter(m=>m.id!==id));renderPW();}

// ============== RIVAL ==============
function getRD(){const def={p1:{name:'박성언',games:13,goals:8,assists:14,pts:22},p2:{name:'주건호',games:17,goals:30,assists:20,pts:50}};const s=localStorage.getItem('rival_d');return s?JSON.parse(s):def;}
function saveRival(){
  const d=getRD();
  ['g','go','a','p'].forEach(k=>{
    const v1=+document.getElementById('ri-p1'+k).value;const v2=+document.getElementById('ri-p2'+k).value;
    const field={g:'games',go:'goals',a:'assists',p:'pts'}[k];
    if(v1>0)d.p1[field]=v1;if(v2>0)d.p2[field]=v2;
  });
  localStorage.setItem('rival_d',JSON.stringify(d));closeModal('modal-rival');renderRival();showToast('업데이트!','#2a1a0a','#ff9800');
}
function openRivalInput(){
  const d=getRD();
  document.getElementById('ri-p1g').value=d.p1.games;document.getElementById('ri-p1go').value=d.p1.goals;
  document.getElementById('ri-p1a').value=d.p1.assists;document.getElementById('ri-p1p').value=d.p1.pts;
  document.getElementById('ri-p2g').value=d.p2.games;document.getElementById('ri-p2go').value=d.p2.goals;
  document.getElementById('ri-p2a').value=d.p2.assists;document.getElementById('ri-p2p').value=d.p2.pts;
  document.getElementById('modal-rival').classList.add('open');
}
function renderRival(){

  const le=gap>0?'🦁':'🦅';
  const fun=gap>25?'주건호 압도 중 🔥 박성언 역전 가능?':gap>10?'치열한 접전! 누가 웃을까?':gap===0?'완전 동점! 🤯 승부 예측 불가!':'박성언이 앞서고 있다! 주건호 위기? 😱';

    <!-- 대결 카드 — 세로 단독 카드 2개 -->
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">

      <!-- 박성언 카드 -->

        <div style="position:absolute;top:0;left:0;width:5px;height:100%;background:#1565C0;border-radius:14px 0 0 14px"></div>
        <div style="display:flex;align-items:center;gap:16px">
          <div style="font-size:44px;flex-shrink:0">🦅</div>
          <div style="flex:1">
            <div style="font-size:11px;color:#1565C0;font-weight:700;margin-bottom:2px">PLAYER 1</div>
            <div style="font-size:22px;font-weight:700;color:#1565C0;margin-bottom:4px">${p1.name}</div>
            <div style="font-size:11px;color:var(--muted)">공격형 미드필더</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:42px;font-weight:700;color:#1565C0;line-height:1">${p1.pts}</div>
            <div style="font-size:12px;color:#1565C0;font-weight:600">pts</div>
          </div>
        </div>
        <div style="margin-top:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:#E3F2FD;border-radius:8px;overflow:hidden">
          <div style="padding:8px;text-align:center;border-right:1px solid rgba(21,101,192,.15)">
            <div style="font-size:10px;color:#1565C0;margin-bottom:2px">출전경기</div>
            <div style="font-size:17px;font-weight:700;color:#1565C0">${p1.games}</div>
          </div>
          <div style="padding:8px;text-align:center;border-right:1px solid rgba(21,101,192,.15)">
            <div style="font-size:10px;color:#1565C0;margin-bottom:2px">골</div>
            <div style="font-size:17px;font-weight:700;color:#1565C0">${p1.goals}</div>
          </div>
          <div style="padding:8px;text-align:center;border-right:1px solid rgba(21,101,192,.15)">
            <div style="font-size:10px;color:#1565C0;margin-bottom:2px">도움</div>
            <div style="font-size:17px;font-weight:700;color:#1565C0">${p1.assists}</div>
          </div>
          <div style="padding:8px;text-align:center">
            <div style="font-size:10px;color:#1565C0;margin-bottom:2px">경기당 pts</div>
            <div style="font-size:17px;font-weight:700;color:#1565C0">${(p1.pts/p1.games).toFixed(2)}</div>
          </div>
        </div>
      </div>

      <!-- VS 배너 -->
      <div style="display:flex;align-items:center;gap:12px;padding:0 8px">
        <div style="flex:1;height:2px;background:linear-gradient(90deg,#1565C0,transparent)"></div>
        <div style="background:#2a1a0a;color:#ff9800;font-size:15px;font-weight:700;padding:6px 18px;border-radius:20px;white-space:nowrap">🔥 VS 🔥</div>
        <div style="flex:1;height:2px;background:linear-gradient(90deg,transparent,#B71C1C)"></div>
      </div>

      <!-- 주건호 카드 -->
      <div style="background:linear-gradient(135deg,#FFEBEE 0%,#fff 60%);border:2px solid #B71C1C;border-radius:14px;padding:18px 20px;position:relative;overflow:hidden">
        <div style="position:absolute;top:0;left:0;width:5px;height:100%;background:#B71C1C;border-radius:14px 0 0 14px"></div>
        <div style="display:flex;align-items:center;gap:16px">
          <div style="font-size:44px;flex-shrink:0">🦁</div>
          <div style="flex:1">
            <div style="font-size:11px;color:#B71C1C;font-weight:700;margin-bottom:2px">PLAYER 2</div>
            <div style="font-size:22px;font-weight:700;color:#B71C1C;margin-bottom:4px">${p2.name}</div>
            <div style="font-size:11px;color:var(--muted)">스트라이커</div>
          </div>
          <div style="text-align:right;flex-shrink:0">
            <div style="font-size:42px;font-weight:700;color:#B71C1C;line-height:1">${p2.pts}</div>
            <div style="font-size:12px;color:#B71C1C;font-weight:600">pts</div>
          </div>
        </div>
        <div style="margin-top:12px;display:grid;grid-template-columns:repeat(4,1fr);gap:0;background:#FFEBEE;border-radius:8px;overflow:hidden">
          <div style="padding:8px;text-align:center;border-right:1px solid rgba(183,28,28,.15)">
            <div style="font-size:10px;color:#B71C1C;margin-bottom:2px">출전경기</div>
            <div style="font-size:17px;font-weight:700;color:#B71C1C">${p2.games}</div>
          </div>
          <div style="padding:8px;text-align:center;border-right:1px solid rgba(183,28,28,.15)">
            <div style="font-size:10px;color:#B71C1C;margin-bottom:2px">골</div>
            <div style="font-size:17px;font-weight:700;color:#B71C1C">${p2.goals}</div>
          </div>
          <div style="padding:8px;text-align:center;border-right:1px solid rgba(183,28,28,.15)">
            <div style="font-size:10px;color:#B71C1C;margin-bottom:2px">도움</div>
            <div style="font-size:17px;font-weight:700;color:#B71C1C">${p2.assists}</div>
          </div>
          <div style="padding:8px;text-align:center">
            <div style="font-size:10px;color:#B71C1C;margin-bottom:2px">경기당 pts</div>
            <div style="font-size:17px;font-weight:700;color:#B71C1C">${(p2.pts/p2.games).toFixed(2)}</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 밥 내기 현황 -->
    <div class="meal-box" style="margin-bottom:16px">
      <h3>🍽️ 2026 밥 내기 현황</h3>
      <div style="display:flex;justify-content:center;gap:24px;margin:12px 0">
        <div style="text-align:center">
          <div style="font-size:10px;color:#ffcc80;margin-bottom:4px">${p1.name}</div>
          <div style="font-size:32px;font-weight:700;color:#64B5F6">${p1.pts}</div>
        </div>
        <div style="display:flex;align-items:center;color:#ff9800;font-size:22px">🆚</div>
        <div style="text-align:center">
          <div style="font-size:10px;color:#ffcc80;margin-bottom:4px">${p2.name}</div>
          <div style="font-size:32px;font-weight:700;color:#EF9A9A">${p2.pts}</div>
        </div>
      </div>
      ${cmpBar(p1.pts,p2.pts)}
      <div style="margin-top:12px">
        <span style="display:inline-block;padding:6px 18px;border-radius:20px;font-size:12px;font-weight:700;background:${lc};color:#fff">${leading} ${Math.abs(gap)}점 앞서는 중 ${le}</span>
      </div>
      <div style="margin-top:8px;font-size:12px;color:#ffcc80;font-style:italic">"${fun}"</div>
      <div style="margin-top:10px;font-size:10px;color:#ffcc80;opacity:.6">※ 2026년 12월 31일 기준 낮은 포인트 = 밥값</div>
    </div>

    <!-- 스탯 비교 -->
    <div class="panel mb16">
      <div class="panel-title" style="justify-content:space-between">
        <div><span class="dot" style="background:#ff9800"></span>스탯 상세 비교</div>
        <button class="btn btn-sm" style="background:#2a1a0a;color:#ff9800;" onclick="openRivalInput()">✏️ 수정</button>
      </div>
      ${[{lbl:'⚽ 총 득점',v1:p1.goals,v2:p2.goals},{lbl:'🎯 총 도움',v1:p1.assists,v2:p2.assists},{lbl:'📊 총 포인트',v1:p1.pts,v2:p2.pts},{lbl:'🏃 출전 경기',v1:p1.games,v2:p2.games}].map(st=>{
        const w=st.v1>st.v2?p1.name:st.v1<st.v2?p2.name:'동점';
        const wc=st.v1>st.v2?'#1565C0':st.v1<st.v2?'#B71C1C':'#888';
        return`<div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
            <span style="font-size:12px;font-weight:700">${st.lbl}</span>

    <!-- 경기당 효율 + 페이스 예측 -->

      <div class="panel-title"><span class="dot" style="background:#ff9800"></span>경기당 효율 · 연말 페이스 예측</div>

        const mo=2.5;
        return`<div style="background:var(--bg);border-radius:10px;padding:14px;margin-bottom:10px">
          <div style="font-size:13px;font-weight:700;color:${c};margin-bottom:10px">${em} ${p.name}</div>
          <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px;text-align:center">
            <div><div style="font-size:9px;color:var(--muted)">경기당 골</div><div style="font-size:16px;font-weight:700;color:${c}">${(p.goals/p.games).toFixed(2)}</div></div>

            <div><div style="font-size:9px;color:var(--muted)">경기당 pts</div><div style="font-size:16px;font-weight:700;color:${c}">${(p.pts/p.games).toFixed(2)}</div></div>
          </div>
          <div style="background:${c}18;border-radius:8px;padding:8px;text-align:center">
            <div style="font-size:10px;color:${c};margin-bottom:2px">연말 예상 (현 페이스)</div>
            <div style="font-size:18px;font-weight:700;color:${c}">${Math.round(p.pts/mo*12)}pts</div>
            <div style="font-size:11px;color:var(--muted)">${Math.round(p.goals/mo*12)}골 ${Math.round(p.assists/mo*12)}도움 예상</div>
          </div>
        </div>`;}).join('')}
    </div>
  `;
}

// ============== UTILS ==============
function bList(data,color){
  if(!data.length)return'';
  const max=Math.max(...data.map(d=>d.v),1);
  return data.map((d,i)=>`<div class="rank-row"><span class="rk-num">${i+1}</span><span class="rk-name">${d.n}</span><div class="rk-bar-wrap"><div class="rk-bar" style="width:${Math.round(d.v/max*100)}%;background:${color}"></div></div><span class="rk-val" style="color:${color}">${d.v}</span></div>`).join('');
}
function dch(ids){ids.forEach(id=>{if(CH[id]){try{CH[id].destroy();}catch(e){}delete CH[id];}});}
function showToast(msg,bg='#1a3a1a',tc='#EF9F27'){
  const t=document.createElement('div');t.className='toast';t.style.cssText=`background:${bg};color:${tc};`;t.textContent='✓ '+msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2200);
}
document.querySelectorAll('.modal-overlay').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open');}));

// ============== INIT ==============
document.getElementById('pw-mdate').value=new Date().toISOString().slice(0,10);
Chart.register(ChartDataLabels);
refreshData();
renderPW();
renderRival();
</script>
